<!DOCTYPE html>
<html>
<head>
    <title>Last Ball Standing - Country Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: Arial;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <script>
        // Game code yahan hoga
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Country data
        const countries = [
            { name: 'India', code: 'IN', color: '#FF9933', wins: 125 },
            { name: 'UK', code: 'GB', color: '#00247D', wins: 10 },
            { name: 'Turkey', code: 'TR', color: '#E30A17', wins: 10 },
            { name: 'USA', code: 'US', color: '#3C3B6E', wins: 9 }
        ];

        // Ball class
        class Ball {
            constructor(x, y, countryIndex) {
                this.x = x;
                this.y = y;
                this.radius = 25;
                this.countryIndex = countryIndex;
                this.speed = 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.active = true;
            }

            move() {
                if (!this.active) return;
                
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Boundary check
                if (this.x < 200 || this.x > 1080) this.angle += Math.PI;
                if (this.y < 100 || this.y > 620) this.angle += Math.PI;
            }

            draw() {
                if (!this.active) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = countries[this.countryIndex].color;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(countries[this.countryIndex].code, this.x-15, this.y+5);
            }

            checkHole() {
                // Check if ball is near the hole at bottom
                if (this.x > 600 && this.x < 680 && this.y > 650) {
                    this.active = false;
                }
            }
        }

        // Game variables
        let balls = [];
        let winner = null;
        
        // Create balls
        for (let i = 0; i < 20; i++) {
            let countryIndex = Math.floor(Math.random() * countries.length);
            balls.push(new Ball(
                300 + Math.random() * 500,
                150 + Math.random() * 400,
                countryIndex
            ));
        }

        // Game loop
        function gameLoop() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, 1280, 720);

            // Draw main circle
            ctx.beginPath();
            ctx.arc(640, 360, 300, 0, Math.PI * 2);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw hole at bottom
            ctx.beginPath();
            ctx.arc(640, 680, 50, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('⬇️ HOLE ⬇️', 570, 650);

            // Draw TOP WINNERS
            ctx.fillStyle = 'yellow';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('TOP WINNERS', 50, 50);
            
            for (let i = 0; i < countries.length; i++) {
                ctx.fillStyle = 'white';
                ctx.font = '18px Arial';
                ctx.fillText(`${i+1}. ${countries[i].name} ${countries[i].wins}W`, 50, 90 + i*30);
            }

            // Move and draw balls
            let activeBalls = 0;
            for (let ball of balls) {
                ball.move();
                ball.checkHole();
                ball.draw();
                if (ball.active) activeBalls++;
            }

            // Check winner
            if (activeBalls === 1 && !winner) {
                for (let ball of balls) {
                    if (ball.active) {
                        winner = countries[ball.countryIndex].name;
                        ctx.fillStyle = 'gold';
                        ctx.font = 'bold 48px Arial';
                        ctx.fillText(`🏆 ${winner} WINS! 🏆`, 400, 300);
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
